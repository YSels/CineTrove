<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <meta name="apple-mobile-web-app-capable" content="yes">

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <title>CineTrove</title>

    <link rel="stylesheet" href="style.css">

    <script src="script.js" defer></script>

</head>

<body>

    <div class="app-container">

        <!-- dit is de header met de titel en de knoppen -->
        <header class="app-header">
            <a href="profile.html"><button>
                    <img src="public/yusuf.JPG" alt="Header Avatar" class="header-avatar">
                </button></a>

            <h1>CineTrove</h1>

            <button id="open-add-btn"><img src="public/buttons/add.svg" alt="Add" class="nav-icon"></button>

        </header>
        <!-- dit zijn de films -->
        <main>
            <h2>My Wishlist</h2>

            <div class="movie-grid">
                <div class="movie-card"><img src="https://media.s-bol.com/BjOr8jZJWnlJ/AJYjq7/550x787.jpg" alt="Bullet Train"></div>
                <div class="movie-card"><img src="https://m.media-amazon.com/images/I/81qg6UsqdSL._SL1500_.jpg" alt="Project Hail Mary 4K Ultra HD"></div>
                <div class="movie-card"><img src="https://i.redd.it/keaxfxiu5ble1.jpeg" alt="Star Wars Episode III: Revenge of the Sith"></div>
                <div class="movie-card"><img src="https://media.s-bol.com/gND5kOXOK0nk/WgkDjo/550x776.jpg" alt="The Creator"></div>
                <div class="movie-card"><img src="https://media.s-bol.com/zg3lyAznvAmO/kRXyzXx/550x733.jpg" alt="Alien Romulus"></div>
            </div>
        </main>

        <!-- dit zijn de knoppen voor de navigatiebalk -->
        <nav class="bottom-nav">
            <a href="index.html">
                <button>
                    <img src="public/buttons/home.svg" alt="Home" class="nav-icon">
                </button>
            </a>
            <a href="collection.html">
                <button>
                    <img src="public/buttons/collection.svg" alt="Collection" class="nav-icon">
                </button>
            </a>
                <a href="wishlist.html" class="active">
            <button>
                <img src="public/buttons/wishlist-active.svg" alt="Wishlist" class="nav-icon">
            </button>
        </nav>

        <div id="add-modal" class="modal-overlay" style="display:none;">
            <div class="modal-content">
                <h2>Add Movie</h2>
                <p>Search for a movie to add to your vault.</p>

                <input type="text" placeholder="Movie title..." class="search-input">

                <button id="close-modal-btn" class="close-btn">Cancel</button>
            </div>
        </div>

    </div>

</body>

</html>
